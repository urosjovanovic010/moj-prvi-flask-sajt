<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TryMyBike - Flask Verzija</title>
    <!-- Ubacujemo Tailwind CSS (umesto našeg običnog style.css) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- HEADER (Gornja Kifla) -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center p-4">

            <!-- LOGO: Sada je klikabilan i vodi na početnu! -->
            <a href="{{ url_for('home') }}"
                class="text-3xl font-extrabold tracking-tight hover:text-blue-200 transition">
                TryMyBike
            </a>

            <!-- NAVIGACIJA: Linkovi sada imaju padding i menjaju pozadinu na hover -->
            <nav class="flex gap-2">
                <a href="{{ url_for('home') }}"
                    class="px-4 py-2 rounded-md hover:bg-blue-700 hover:shadow-inner transition font-medium">
                    Početna
                </a>
                <a href="{{ url_for('onama') }}"
                    class="px-4 py-2 rounded-md hover:bg-blue-700 hover:shadow-inner transition font-medium">
                    O nama
                </a>
                <a href="{{ url_for('kontakt') }}"
                    class="px-4 py-2 rounded-md hover:bg-blue-700 hover:shadow-inner transition font-medium">
                    Kontakt
                </a>
                <a href="{{ url_for('kategorija', ime_kategorije='Delovi') }}"
                    class="px-4 py-2 rounded-md hover:bg-blue-700 hover:shadow-inner transition font-medium">Delovi</a>
                <a href="{{ url_for('kategorija', ime_kategorije='Oprema') }}"
                    class="px-4 py-2 rounded-md hover:bg-blue-700 hover:shadow-inner transition font-medium">Oprema</a>

            </nav>

        </div>
    </header>

    <!-- SREDINA (Mesto za punjenje) -->
    <main class="container mx-auto flex-grow p-4 mt-4">

        {% block content %}
        <!-- Ovde će se automatski ubacivati sadržaj drugih stranica -->
        {% endblock %}

    </main>

    <!-- FOOTER (Donja Kifla) -->
    <footer class="bg-gray-800 text-white text-center p-4 mt-auto">
        <p>&copy; 2026 TryMyBike. Sva prava zadržana.</p>
    </footer>

</body>

</html>
