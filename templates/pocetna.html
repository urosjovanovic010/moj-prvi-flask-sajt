{% extends "base.html" %}

{% block content %}

<!-- GLAVNI KONTEJNER (Sendvič) -->
<!-- relative = omogućava slojevima unutra da se ređaju jedan preko drugog -->
<!-- h-96 = fiksna visina za hero sekciju, overflow-hidden = seče sliku ako je prevelika -->
<div class="relative h-96 rounded-lg overflow-hidden shadow-lg mb-8">

    <!-- 1. SLOJ: SLIKA -->
    <!-- absolute inset-0 = rastegni se preko celog kontejnera -->
    <!-- object-cover = iseci sliku lepo da popuni prostor bez spljoštavanja -->
    <img src="{{ url_for('static', filename='images/hero.png') }}" alt="Hero slika"
        class="absolute inset-0 w-full h-full object-cover">

    <!-- 2. SLOJ: CRNI FILTER (OVERLAY) -->
    <!-- bg-black/60 = Crna boja sa 60% providnosti (probaj bg-black/40 ako ti je pretamno) -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- 3. SLOJ: TEKST -->
    <!-- relative z-10 = Gura tekst NA VRH iznad slike i crnog filtera -->
    <!-- flex ... = Centrira tekst i po horizontali i po vertikali -->
    <div class="relative z-10 h-full flex flex-col justify-center items-center text-center p-6">
        <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-4">Dobrodošli na TryMyBike!</h2>
        <p class="text-xl md:text-2xl text-gray-200 mb-6">Tvoja omiljena radnja za bicikle i opremu.</p>

        <!-- Prikazujemo promenljivu iz Pythona! -->
        <p class="text-lg text-blue-300 font-semibold border border-blue-300 px-4 py-2 rounded-full backdrop-blur-sm">
            Drago nam je da si tu, {{ moje_ime }}!
        </p>
    </div>

</div>


<h3 class="text-2xl font-bold mt-8 mb-4 text-left text-gray-800">Naši proizvodi:</h3>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    {% for proizvod in proizvodi %}

    <a href="{{ url_for('detalji_proizvoda', id=proizvod.id)}} " class="block">

        <!-- Dodato: h-full flex flex-col (natera karticu da popuni visinu i ređa elemente u kolonu) -->
        <div
            class="bg-gray-50 border border-gray-200 p-4 rounded-lg shadow-sm hover:shadow-md transition h-full flex flex-col">

            <!-- Dodato: w-full h-48 object-cover za SLIKU! -->
            <!-- h-48 je fiksna visina. object-cover iseče višak da se ne bi spljoštila slika -->
            <img src="{{ url_for('static', filename='images/' + proizvod.slika) }}" alt="{{ proizvod.naziv }}"
                class="w-full h-48 object-cover rounded-md mb-4">

            <h4 class="text-xl font-semibold text-blue-700">{{ proizvod.naziv }}</h4>

            <!-- Dodato: mt-auto -->
            <!-- Ovo gura cenu na SAMO DNO kartice, bez obzira na visinu slike i naslova -->
            <p class="text-lg text-gray-600 mt-auto pt-4">Cena:
                <span class="font-bold text-green-600">{{ proizvod.cena }} RSD</span>
            </p>

        </div>
    </a>

    {% endfor %}
</div>

{% endblock %}
