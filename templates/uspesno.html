{% extends "base.html" %}
{% block naslov_stranice %}Uspešna kupovina - TryMyBike{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-24 text-center max-w-2xl">
    
    <!-- Animacija kvačice -->
    <div class="mx-auto w-28 h-28 bg-[#ECFDF5] text-[#059669] rounded-full flex items-center justify-center mb-8 border-4 border-white shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
    </div>
    
    <h1 class="text-4xl font-extrabold text-[#111827] mb-4">Hvala na poverenju!</h1>
    <p class="text-lg text-gray-500 mb-10">Vaša porudžbina je uspešno zabeležena u bazi podataka. Vaša korpa je sada ispražnjena.</p>
    
    <a href="{{ url_for('home') }}" class="inline-block bg-[#EA580C] hover:bg-[#C2410C] text-white font-bold px-10 py-4 rounded-xl shadow-md transition transform hover:-translate-y-0.5">
        Povratak u prodavnicu
    </a>

</div>
{% endblock %}
