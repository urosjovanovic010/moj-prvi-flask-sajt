<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block naslov_stranice %}Admin Panel{% endblock %} - TryMyBike</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex flex-col text-[#0F172A]">

    <!-- Admin Navbar -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <a href="{{ url_for('admin_dashboard') }}" class="text-2xl font-extrabold text-gray-900 tracking-tight">
                Admin Dashboard
            </a>

            <nav class="flex flex-wrap gap-3">
                <a href="#" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded transition shadow-sm">Manage Categories</a>
                <a href="#" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded transition shadow-sm">Manage Products</a>
                <a href="{{ url_for('admin_dashboard') }}" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold py-2 px-4 rounded transition shadow-sm">Manage Orders</a>
                <a href="#" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold py-2 px-4 rounded transition shadow-sm">Import Products</a>
                <a href="/" class="text-red-600 hover:text-red-700 text-sm font-bold py-2 px-4 transition">Izlaz (Logout)</a>
            </nav>

        </div>
    </header>

    <!-- Glavni sadržaj -->
    <main class="flex-grow p-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
